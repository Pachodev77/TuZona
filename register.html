<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuZona - Registro</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <style>

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background-color: #e9ecef;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .strength-meter {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        .strength-weak { background-color: #dc3545; }
        .strength-fair { background-color: #fd7e14; }
        .strength-good { background-color: #ffc107; }
        .strength-strong { background-color: #28a745; }
        .strength-very-strong { background-color: #20c997; }
        
        .strength-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            text-align: right;
            color: var(--text-light);
        }
        
        .auth-container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        
        .auth-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-color);
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }
        
        .form-group input:focus {
            border-color: #80bdff;
            outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        
        .btn {
            display: inline-block;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            vertical-align: middle;
            user-select: none;
            border: 1px solid transparent;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: 4px;
            transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out, 
                        border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            cursor: pointer;
            width: 100%;
        }
        
        .btn-primary {
            color: white;
            background-color: #007bff;
            border-color: #007bff;
        }
        
        .btn-primary:hover {
            background-color: #0069d9;
            border-color: #0062cc;
        }
        
        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        
        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
        }
        
        .auth-switch a {
            color: #007bff;
            text-decoration: none;
        }
        
        .auth-switch a:hover {
            text-decoration: underline;
        }
        
        .alerts-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1050;
            max-width: 350px;
            width: 100%;
        }
        
        .alert {
            position: relative;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid transparent;
            border-radius: 4px;
            display: flex;
            align-items: center;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        
        .alert-success {
            color: #155724;
            background-color: #d4edda;
            border-color: #c3e6cb;
        }
        
        .alert-error {
            color: #721c24;
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
        
        .alert-icon {
            margin-right: 0.75rem;
            font-size: 1.25rem;
        }
        
        .alert-content {
            flex: 1;
        }
        
        .alert-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .alert-message {
            font-size: 0.875rem;
        }
        
        .alert-close {
            background: none;
            border: none;
            font-size: 1.25rem;
            line-height: 1;
            color: inherit;
            opacity: 0.7;
            cursor: pointer;
            padding: 0;
            margin-left: 1rem;
        }
        
        .alert-close:hover {
            opacity: 1;
        }
        
        @media (max-width: 576px) {
            .auth-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .alerts-container {
                left: 1rem;
                right: 1rem;
                max-width: none;
            }
        }
    
</style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="images/tuzona.png" alt="TuZona - Clasificados en Colombia" class="logo-img">
                </a>
            
        </div>
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="images/tuzona.png" alt="TuZona - Clasificados en Colombia" class="logo-img">
                </a>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="¿Qué estás buscando?">
                <button type="submit" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
                <select id="region">
                    <option value="">Toda Colombia</option>
                    <option value="Amazonas">Amazonas</option>
                    <option value="Antioquia">Antioquia</option>
                    <option value="Arauca">Arauca</option>
                    <option value="Atlántico">Atlántico</option>
                    <option value="Bolívar">Bolívar</option>
                    <option value="Boyacá">Boyacá</option>
                    <option value="Caldas">Caldas</option>
                    <option value="Caquetá">Caquetá</option>
                    <option value="Casanare">Casanare</option>
                    <option value="Cauca">Cauca</option>
                    <option value="Cesar">Cesar</option>
                    <option value="Chocó">Chocó</option>
                    <option value="Córdoba">Córdoba</option>
                    <option value="Cundinamarca">Cundinamarca</option>
                    <option value="Guainía">Guainía</option>
                    <option value="Guaviare">Guaviare</option>
                    <option value="Huila">Huila</option>
                    <option value="La Guajira">La Guajira</option>
                    <option value="Magdalena">Magdalena</option>
                    <option value="Meta">Meta</option>
                    <option value="Nariño">Nariño</option>
                    <option value="Norte de Santander">Norte de Santander</option>
                    <option value="Putumayo">Putumayo</option>
                    <option value="Quindío">Quindío</option>
                    <option value="Risaralda">Risaralda</option>
                    <option value="San Andrés y Providencia">San Andrés y Providencia</option>
                    <option value="Santander">Santander</option>
                    <option value="Sucre">Sucre</option>
                    <option value="Tolima">Tolima</option>
                    <option value="Valle del Cauca">Valle del Cauca</option>
                    <option value="Vaupés">Vaupés</option>
                    <option value="Vichada">Vichada</option>
                    <option value="Bogotá">Bogotá</option>
                </select>
            </div>
            <div class="user-actions">
                
                <button id="theme-toggle" class="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema">
                    <i class="fas fa-moon toggle-icon"></i>
                </button>
                <a href="login.html" class="header-avatar-btn" title="Iniciar sesión" aria-label="Iniciar sesión"><i class="fas fa-user"></i></a>
                <a href="publish.html" class="btn btn-publish" title="Publicar anuncio" aria-label="Publicar anuncio"><i class="fas fa-plus"></i></a>
            </div>
        </div>
    </header>

    <!-- Alerts Container -->
    <div class="alerts-container"></div>

    <!-- Main Content -->
    <main class="container main-content">
        <section class="auth-container">
            <h2>Regístrate</h2>
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="30" 
                           placeholder="Ingresa tu nombre de usuario" autocomplete="username">
                    <small class="text-muted">3-30 caracteres, solo letras, números y guiones bajos</small>
                </div>
                
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="tucorreo@ejemplo.com" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" required minlength="6" 
                               placeholder="Crea una contraseña segura" autocomplete="new-password">
                        <button type="button" class="toggle-password" 
                                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-meter" id="password-strength-meter"></div>
                    </div>
                    <div class="strength-text" id="password-strength-text"></div>
                    <small class="text-muted">Mínimo 6 caracteres, se recomienda usar mayúsculas, minúsculas, números y símbolos</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirmar contraseña</label>
                    <div style="position: relative;">
                        <input type="password" id="confirm-password" name="confirm-password" required minlength="6" 
                               placeholder="Vuelve a escribir tu contraseña" autocomplete="new-password">
                        <button type="button" class="toggle-password" 
                                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" id="register-button">
                        Crear cuenta
                    </button>
                </div>
                
                <div class="form-group" style="text-align: center; margin-top: 1.5rem;">
                    <p class="text-muted" style="margin-bottom: 0.5rem;">O regístrate con:</p>
                    <button type="button" class="btn btn-outline" id="google-signup" style="margin: 0.25rem;">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn btn-outline" style="margin: 0.25rem;" disabled>
                        <i class="fab fa-facebook"></i> Facebook
                    </button>
                </div>
                
                <div class="form-group" style="margin-top: 1.5rem;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" id="terms" name="terms" required 
                               style="margin-right: 0.5rem; width: auto;">
                        <span style="font-size: 0.875rem; color: #6c757d;">
                            Acepto los <a href="#" style="color: #007bff; text-decoration: none;">Términos de servicio</a> y 
                            <a href="#" style="color: #007bff; text-decoration: none;">Política de privacidad</a>
                        </span>
                    </label>
                </div>
            </form>
            
            <p class="auth-switch">
                ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
            </p>
        </section>
    </main>

    <!-- Footer (inyectado desde js/footer.js) -->
    <footer class="footer" id="site-footer"></footer>

    <script type="module" src="js/register.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/footer.js"></script>
</body>
</html>
