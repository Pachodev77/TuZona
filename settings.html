<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - TuZona</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="images/tuzona.png" alt="TuZona - Clasificados en Colombia" class="logo-img">
                </a>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="¿Qué estás buscando?">
                <button type="submit" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
                <select id="region">
                    <option value="">Toda Colombia</option>
                    <option value="Amazonas">Amazonas</option>
                    <option value="Antioquia">Antioquia</option>
                    <option value="Arauca">Arauca</option>
                    <option value="Atlántico">Atlántico</option>
                    <option value="Bolívar">Bolívar</option>
                    <option value="Boyacá">Boyacá</option>
                    <option value="Caldas">Caldas</option>
                    <option value="Caquetá">Caquetá</option>
                    <option value="Casanare">Casanare</option>
                    <option value="Cauca">Cauca</option>
                    <option value="Cesar">Cesar</option>
                    <option value="Chocó">Chocó</option>
                    <option value="Córdoba">Córdoba</option>
                    <option value="Cundinamarca">Cundinamarca</option>
                    <option value="Guainía">Guainía</option>
                    <option value="Guaviare">Guaviare</option>
                    <option value="Huila">Huila</option>
                    <option value="La Guajira">La Guajira</option>
                    <option value="Magdalena">Magdalena</option>
                    <option value="Meta">Meta</option>
                    <option value="Nariño">Nariño</option>
                    <option value="Norte de Santander">Norte de Santander</option>
                    <option value="Putumayo">Putumayo</option>
                    <option value="Quindío">Quindío</option>
                    <option value="Risaralda">Risaralda</option>
                    <option value="San Andrés y Providencia">San Andrés y Providencia</option>
                    <option value="Santander">Santander</option>
                    <option value="Sucre">Sucre</option>
                    <option value="Tolima">Tolima</option>
                    <option value="Valle del Cauca">Valle del Cauca</option>
                    <option value="Vaupés">Vaupés</option>
                    <option value="Vichada">Vichada</option>
                    <option value="Bogotá">Bogotá</option>
                </select>
            </div>
            <div class="user-actions">
                
                <button id="theme-toggle" class="theme-toggle" title="Cambiar tema">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="login.html" class="btn"><i class="fas fa-user"></i> Iniciar sesión</a>
                <a href="publish.html" class="btn btn-outline"><i class="fas fa-plus"></i> Publicar</a>
            </div>
        </div>
    </header>

    <main class="container main-content">
        <div class="page-header">
            <h1>Configuración</h1>
            <nav class="breadcrumb">
                <a href="index.html">Inicio</a> > <a href="account.html">Mi Cuenta</a> > <span>Configuración</span>
            </nav>
        </div>

        <div class="settings-container">
            <aside class="settings-sidebar">
                <ul class="settings-menu">
                    <li><a href="#profile" class="active" data-section="profile"><i class="fas fa-user"></i> Perfil</a></li>
                    <li><a href="#notifications" data-section="notifications"><i class="fas fa-bell"></i> Notificaciones</a></li>
                    <li><a href="#security" data-section="security"><i class="fas fa-shield-alt"></i> Seguridad</a></li>
                    <li><a href="#privacy" data-section="privacy"><i class="fas fa-lock"></i> Privacidad</a></li>
                </ul>
            </aside>

            <div class="settings-content">
                <!-- Profile Section -->
                <section id="profile-section" class="settings-section active">
                    <h2>Perfil</h2>
                    <form id="profile-form">
                        <div class="form-group">
                            <label for="name">Nombre completo</label>
                            <input type="text" id="name" class="form-control" placeholder="Tu nombre">
                        </div>
                        <div class="form-group">
                            <label for="email">Correo electrónico</label>
                            <input type="email" id="email" class="form-control" placeholder="tu@correo.com" disabled>
                        </div>
                        <div class="form-group">
                            <label for="phone">Teléfono</label>
                            <input type="tel" id="phone" class="form-control" placeholder="+57 300 000 0000">
                        </div>
                        <button type="submit" class="btn-save">Guardar cambios</button>
                    </form>
                </section>

                <!-- Notifications Section -->
                <section id="notifications-section" class="settings-section">
                    <h2>Notificaciones</h2>
                    <form id="notifications-form">
                        <div class="form-group">
                            <label><input type="checkbox" id="notif-email" checked> Notificaciones por correo</label>
                        </div>
                        <div class="form-group">
                            <label><input type="checkbox" id="notif-push" checked> Notificaciones push</label>
                        </div>
                        <button type="submit" class="btn-save">Guardar preferencias</button>
                    </form>
                </section>

                <!-- Security Section -->
                <section id="security-section" class="settings-section">
                    <h2>Seguridad</h2>
                    <form id="security-form">
                        <div class="form-group">
                            <label for="current-password">Contraseña actual</label>
                            <input type="password" id="current-password" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="new-password">Nueva contraseña</label>
                            <input type="password" id="new-password" class="form-control">
                        </div>
                        <button type="submit" class="btn-save">Cambiar contraseña</button>
                    </form>
                </section>

                <!-- Privacy Section -->
                <section id="privacy-section" class="settings-section">
                    <h2>Privacidad</h2>
                    <form id="privacy-form">
                        <div class="form-group">
                            <label><input type="checkbox" id="privacy-public" checked> Perfil público</label>
                        </div>
                        <div class="form-group">
                            <label><input type="checkbox" id="privacy-show-email" checked> Mostrar correo electrónico</label>
                        </div>
                        <button type="submit" class="btn-save">Guardar preferencias</button>
                    </form>
                </section>
            </div>
        </div>
    </main>

    <!-- Footer (inyectado desde js/footer.js) -->
    <footer class="footer" id="site-footer"></footer>

    <script type="module" src="js/settings.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/footer.js"></script>
</body>
</html>
