<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuZona - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-light, #6c757d);
            margin: 1.25rem 0;
            font-size: 0.85rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dee2e6;
        }
        .auth-divider span {
            padding: 0 0.75rem;
        }
        .btn-google:hover {
            background: #f8f9fa !important;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="images/tuzona.png" alt="TuZona - Clasificados en Colombia" class="logo-img">
                </a>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="¿Qué estás buscando?">
                <button type="submit" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
                <select id="region">
                    <option value="">Toda Colombia</option>
                    <option value="Amazonas">Amazonas</option>
                    <option value="Antioquia">Antioquia</option>
                    <option value="Arauca">Arauca</option>
                    <option value="Atlántico">Atlántico</option>
                    <option value="Bolívar">Bolívar</option>
                    <option value="Boyacá">Boyacá</option>
                    <option value="Caldas">Caldas</option>
                    <option value="Caquetá">Caquetá</option>
                    <option value="Casanare">Casanare</option>
                    <option value="Cauca">Cauca</option>
                    <option value="Cesar">Cesar</option>
                    <option value="Chocó">Chocó</option>
                    <option value="Córdoba">Córdoba</option>
                    <option value="Cundinamarca">Cundinamarca</option>
                    <option value="Guainía">Guainía</option>
                    <option value="Guaviare">Guaviare</option>
                    <option value="Huila">Huila</option>
                    <option value="La Guajira">La Guajira</option>
                    <option value="Magdalena">Magdalena</option>
                    <option value="Meta">Meta</option>
                    <option value="Nariño">Nariño</option>
                    <option value="Norte de Santander">Norte de Santander</option>
                    <option value="Putumayo">Putumayo</option>
                    <option value="Quindío">Quindío</option>
                    <option value="Risaralda">Risaralda</option>
                    <option value="San Andrés y Providencia">San Andrés y Providencia</option>
                    <option value="Santander">Santander</option>
                    <option value="Sucre">Sucre</option>
                    <option value="Tolima">Tolima</option>
                    <option value="Valle del Cauca">Valle del Cauca</option>
                    <option value="Vaupés">Vaupés</option>
                    <option value="Vichada">Vichada</option>
                    <option value="Bogotá">Bogotá</option>
                </select>
            </div>
            <div class="user-actions">
                
                <button id="theme-toggle" class="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema">
                    <i class="fas fa-moon toggle-icon"></i>
                </button>
                <a href="login.html" class="header-avatar-btn" title="Iniciar sesión" aria-label="Iniciar sesión"><i class="fas fa-user"></i></a>
                <a href="publish.html" class="btn btn-publish" title="Publicar anuncio" aria-label="Publicar anuncio"><i class="fas fa-plus"></i></a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container main-content">
        <section class="auth-container">
            <h2>Iniciar Sesión</h2>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="tucorreo@ejemplo.com"
                           autocomplete="email">
                    <div class="invalid-feedback">Por favor ingresa un correo electrónico válido</div>
                </div>
                
                <div class="form-group">
                    <div class="password-container">
                        <label for="password">Contraseña</label>
                        <div class="input-group">
                            <input type="password" id="password" name="password" 
                                   required minlength="6"
                                   placeholder="••••••"
                                   autocomplete="current-password">
                            <span class="input-group-text" onclick="togglePasswordVisibility('password')">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                        <div class="invalid-feedback">La contraseña es requerida</div>
                        <div class="forgot-password">
                            <a href="forgot-password.html">¿Olvidaste tu contraseña?</a>
                        </div>
                    </div>
                </div>
                
                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                    <label class="form-check-label" for="remember-me">Recordarme en este dispositivo</label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="login-button">
                    <span class="btn-text">Iniciar Sesión</span>
                </button>

                <div class="auth-divider"><span>o</span></div>

                <button type="button" class="btn btn-google btn-block" id="google-login-button"
                        style="background:#fff; color:#3c4043; border:1px solid #dadce0; display:flex; align-items:center; justify-content:center; gap:8px;">
                    <i class="fab fa-google"></i> Continuar con Google
                </button>
            </form>
            <p class="auth-switch">¿No tienes una cuenta? <a href="register.html">Regístrate</a></p>
        </section>
    </main>

    <!-- Footer (inyectado desde js/footer.js) -->
    <footer class="footer" id="site-footer"></footer>

    <script type="module" src="js/login.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/footer.js"></script>
</body>
</html>
